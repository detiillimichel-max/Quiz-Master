const MAX_ERRORS = 3;
const TIMER_SECONDS = 15;

function loadProgress() {
  try { return JSON.parse(localStorage.getItem("quiz_progress") || "{}"); }
  catch { return {}; }
}
function saveProgress(data) {
  localStorage.setItem("quiz_progress", JSON.stringify(data));
}
function normalize(str) {
  return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}

function Timer({ seconds, total, color }) {
  const pct = (seconds / total) * 100;
  const urgent = seconds <= 5;
  return (
    <div className="timer-wrap">
      <svg viewBox="0 0 44 44" className="timer-svg">
        <circle cx="22" cy="22" r="19" fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="3"/>
        <circle cx="22" cy="22" r="19" fill="none"
          stroke={urgent ? "#ff4444" : color} strokeWidth="3"
          strokeDasharray={`${2*Math.PI*19}`}
          strokeDashoffset={`${2*Math.PI*19*(1-pct/100)}`}
          strokeLinecap="round"
          style={{transition:"stroke-dashoffset 1s linear",transform:"rotate(-90deg)",transformOrigin:"center"}}
        />
      </svg>
      <span className="timer-num" style={{color: urgent?"#ff4444":color}}>{seconds}</span>
    </div>
  );
}

function PhaseSelector({ nicho, unlockedPhase, onSelect, onBack }) {

  );
}

function GameBoard({ nicho, phaseIdx, onComplete, onFail, onBack }) {
  const phase = nicho.phases[phaseIdx];
  const [qIdx, setQIdx] = useState(0);
  const [input, setInput] = useState("");
  const [errors, setErrors] = useState(0);
  const [score, setScore] = useState(0);
  const [timeLeft, setTimeLeft] = useState(TIMER_SECONDS);
  const [feedback, setFeedback] = useState(null);
  const [shakeInput, setShakeInput] = useState(false);
  const inputRef = useRef(null);
  const timerRef = useRef(null);
  const current = phase.questions[qIdx];

  const nextQuestion = useCallback((isCorrect) => {
    clearInterval(timerRef.current);
    const nextIdx = qIdx + 1;
    setTimeout(() => {
      setFeedback(null); setInput(""); setTimeLeft(TIMER_SECONDS);
      if (nextIdx >= phase.questions.length) onComplete(score + (isCorrect?10:0));
      else setQIdx(nextIdx);
    }, 900);
  }, [qIdx, phase.questions.length, score, onComplete]);

  const handleWrong = useCallback(() => {
    const ne = errors + 1;
    setErrors(ne); setFeedback("wrong"); setShakeInput(true);
    setTimeout(() => setShakeInput(false), 600);
    if (ne >= MAX_ERRORS) { clearInterval(timerRef.current); setTimeout(() => onFail(), 900); }
    else nextQuestion(false);
  }, [errors, nextQuestion, onFail]);

  useEffect(() => {
    timerRef.current = setInterval(() => {
      setTimeLeft(t => { if(t<=1){handleWrong();return TIMER_SECONDS;} return t-1; });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [qIdx, handleWrong]);

  useEffect(() => { inputRef.current?.focus(); }, [qIdx]);

  const handleSubmit = () => {
    const ans = normalize(input);
    const correct = normalize(current.a);
    if (ans===correct || correct.split(" ").some(w=>w.length>3&&ans===w)) {
      setScore(s=>s+10); setFeedback("correct"); nextQuestion(true);
    } else handleWrong();
  };

  return (
    <div className="gameboard" style={{"--nc":nicho.color,"--glow":nicho.glow}}>
      <div className="gb-header">
        <button className="back-btn-sm" onClick={onBack}>✕</button>
        <div className="gb-meta">
          <span style={{color:nicho.color}}>{nicho.emoji} {nicho.name}</span>
          <span className="gb-phase">Fase {phaseIdx+1} · {phase.title}</span>
        </div>
        <div className="gb-score">{score}pts</div>
      </div>
      <div className="progress-bar">
        <div className="progress-fill" style={{width:`${(qIdx/phase.questions.length)*100}%`,background:nicho.color}}/>
      </div>
      <div className="errors-row">
        {Array.from({length:MAX_ERRORS}).map((_,i)=>(
          <span key={i} className={`error-dot ${i<errors?"active":""}`}>❌</span>
        ))}
        <span className="q-counter">{qIdx+1}/{phase.questions.length}</span>
      </div>
      <div className={`question-card ${feedback==="correct"?"flash-green":feedback==="wrong"?"flash-red":""}`}>
        <Timer seconds={timeLeft} total={TIMER_SECONDS} color={nicho.color}/>
        <p className="question-text">{current.q}</p>
        {feedback==="correct"&&<div className="feedback-badge correct">✓ Correto!</div>}
        {feedback==="wrong"&&<div className="feedback-badge wrong">✗ {current.a}</div>}
      </div>
      <div className={`answer-wrap ${shakeInput?"shake":""}`}>
        <input ref={inputRef} value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&handleSubmit()}
          placeholder="Digite sua resposta..."
          className="answer-input" style={{"--nc":nicho.color}}
          disabled={!!feedback} autoComplete="off" autoCorrect="off" spellCheck={false}
        />
        <button className="send-btn" style={{background:nicho.color}}
          onClick={handleSubmit} disabled={!!feedback||!input.trim()}>➜</button>
      </div>
      <p className="hint-text">Pressione Enter ou clique ➜ para responder</p>
    </div>
  );
}

function ResultScreen({ type, score, nicho, phase, onRetry, onHome }) {
  const win = type==="win";
  return (
    <div className="result-screen" style={{"--nc":nicho.color,"--glow":nicho.glow}}>
      <div className="result-icon">{win?"🏆":"💀"}</div>
      <h2 className="result-title" style={{color:win?nicho.color:"#ff4444"}}>
        {win?"Fase Concluída!":"Game Over"}
      </h2>
      <p className="result-sub">
        {win?`Você completou a fase ${phase+1} de ${nicho.name}!`:`Você errou ${MAX_ERRORS} vezes.`}
      </p>
      <div className="result-score" style={{borderColor:nicho.color}}>
        <span className="rs-label">Pontuação</span>
        <span className="rs-num" style={{color:nicho.color}}>{score}</span>
      </div>
      <div className="result-btns">
        <button className="r-btn primary" style={{background:nicho.color}} onClick={onRetry}>
          {win?"Próxima Fase":"Tentar Novamente"}
        </button>
        <button className="r-btn secondary" onClick={onHome}>Início</button>
      </div>
    </div>
  );
}

        .feedback-badge.correct{background:rgba(105,255,71,0.15);color:#69ff47;border:1px solid #69ff47}
        .feedback-badge.wrong{background:rgba(255,68,68,0.15);color:#ff6666;border:1px solid #ff4444}
        @keyframes popIn{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
        .answer-wrap{display:flex;gap:10px;align-items:stretch}
        .answer-wrap.shake{animation:shake .5s ease}
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
        .answer-input{flex:1;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);border-radius:16px;padding:14px 18px;color:#fff;font-size:16px;font-family:'Exo 2',sans-serif;outline:none;transition:border-color .2s}
        .answer-input:focus{border-color:var(--nc)}
        .answer-input::placeholder{color:rgba(255,255,255,0.25)}
        .send-btn{border:none;border-radius:16px;padding:14px 20px;font-size:20px;cursor:pointer;transition:all .15s;color:#000;font-weight:900}
        .send-btn:hover:not(:disabled){filter:brightness(1.1) scale(1.04)}
        .send-btn:disabled{opacity:.4;cursor:not-allowed}
        .hint-text{font-size:11px;color:rgba(255,255,255,0.25);text-align:center}
        .result-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:40px 24px;gap:20px;text-align:center;width:100%;max-width:480px;margin:0 auto}
        .result-icon{font-size:80px;animation:float 2s ease-in-out infinite}
        .result-title{font-size:36px;font-weight:900}
        .result-sub{font-size:15px;color:rgba(255,255,255,0.5)}
        .result-score{border:2px solid;border-radius:20px;padding:20px 48px;display:flex;flex-direction:column;gap:4px;background:rgba(255,255,255,0.04)}
        .rs-label{font-size:12px;color:rgba(255,255,255,0.4);font-family:'JetBrains Mono',monospace}
        .rs-num{font-size:48px;font-weight:900;font-family:'JetBrains Mono',monospace}
        .result-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px}
        .r-btn{border:none;border-radius:100px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Exo 2',sans-serif;transition:all .15s}
        .r-btn.primary{color:#000;box-shadow:0 0 30px var(--glow)}
        .r-btn.primary:hover{filter:brightness(1.1);transform:scale(1.02)}
        .r-btn.secondary{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff}
        .r-btn.secondary:hover{background:rgba(255,255,255,0.12)}
      `}</style>
      <div className="app">
        {screen==="splash"&&(
          <div className="splash">
            <div className="splash-logo">🧠</div>
            <h1 className="splash-title">Quiz Master</h1>
            <p className="splash-sub">400 desafios em 4 nichos. Prove seu conhecimento fase a fase.</p>
            <div className="stats-row">
              <span className="stat-chip"><strong>4</strong> nichos</span>
              <span className="stat-chip"><strong>40</strong> fases</span>
              <span className="stat-chip"><strong>400</strong> perguntas</span>
            </div>
            <button className="play-btn" onClick={()=>setScreen("nicho_select")}>JOGAR AGORA</button>
            {Object.keys(progress).length>0&&(
              <p className="progress-info">✓ Progresso salvo: {GAME_DATA.nichos.map(n=>`${n.name} F${getUnlockedPhase(n.id)}`).join(" · ")}</p>
            )}
          </div>
        )}
        {screen==="nicho_select"&&(
          <div className="nicho-select">
            <p className="screen-title">Escolha seu Nicho</p>
            {GAME_DATA.nichos.map(n=>(
              <NichoCard key={n.id} nicho={n} unlockedPhase={getUnlockedPhase(n.id)}
                onClick={nicho=>{setSelectedNicho(nicho);setScreen("phases");}}/>
            ))}
            <button className="back-btn" style={{alignSelf:"center"}} onClick={()=>setScreen("splash")}>← Voltar</button>
          </div>
        )}
        {screen==="phases"&&selectedNicho&&(
          <PhaseSelector nicho={selectedNicho} unlockedPhase={getUnlockedPhase(selectedNicho.id)}
            onSelect={i=>{setSelectedPhase(i);setScreen("game");}}
            onBack={()=>setScreen("nicho_select")}/>
        )}
        {screen==="game"&&selectedNicho&&(
          <GameBoard key={`${selectedNicho.id}-${selectedPhase}`}
            nicho={selectedNicho} phaseIdx={selectedPhase}
            onComplete={s=>{updateProgress(selectedNicho.id,selectedPhase);setTotalScore(s);setResult("win");setScreen("result");}}
            onFail={()=>{setResult("fail");setScreen("result");}}
            onBack={()=>setScreen("phases")}/>
        )}
        {screen==="result"&&selectedNicho&&(
          <ResultScreen type={result} score={totalScore}
            nicho={selectedNicho} phase={selectedPhase}
            onRetry={handleRetry} onHome={()=>setScreen("nicho_select")}/>
        )}
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(r => console.log('SW OK:', r.scope))
        .catch(e => console.error('SW erro:', e));
    });
  }
</script>
</body>
</html>
